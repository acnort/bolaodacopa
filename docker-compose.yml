services:
  postgres:
    image: postgres:16-alpine
    container_name: bolaov2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bolaov2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bolaov2"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
