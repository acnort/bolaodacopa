name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: bolaov2
  PROJECT_DIR: /usr/documents/projects/bolaov2
  BACKUP_DIR: /usr/documents/backups/bolaov2/postgres

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove env files from runner
        run: |
          rm -f .env .env.local .env.*.local

      - name: Sync project to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSHKEY }}
          source: "."
          target: "${{ env.PROJECT_DIR }}"
          strip_components: 0
          timeout: 180s
          overwrite: true
          rm: false
          exclude: "node_modules,.next,.env,.env.local,.git"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSHKEY }}
          script: |
            set -euo pipefail

            PROJECT_DIR="${{ env.PROJECT_DIR }}"
            cd "$PROJECT_DIR"

            if [ ! -f .env ]; then
              echo "❌ .env not found in $PROJECT_DIR"
              echo "Create it from .env.production.example before deploying."
              exit 1
            fi

            echo "🏗️ Building and starting services..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build --remove-orphans

            echo "💾 Installing database backup schedule..."
            chmod +x scripts/backup-postgres.sh
            mkdir -p "${{ env.BACKUP_DIR }}"
            BACKUP_CMD="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin PROJECT_DIR=$PROJECT_DIR BACKUP_DIR=${{ env.BACKUP_DIR }} $PROJECT_DIR/scripts/backup-postgres.sh >> ${{ env.BACKUP_DIR }}/backup.log 2>&1"

            if command -v crontab >/dev/null 2>&1; then
              CRON_LINE="30 3 * * * $BACKUP_CMD"
              (crontab -l 2>/dev/null | grep -v "$PROJECT_DIR/scripts/backup-postgres.sh" || true; echo "$CRON_LINE") | crontab -
            elif command -v systemctl >/dev/null 2>&1 && [ -d /etc/systemd/system ]; then
              cat > /etc/systemd/system/bolaov2-db-backup.service <<EOF
            [Unit]
            Description=Backup bolaov2 Postgres database
            After=docker.service
            Requires=docker.service

            [Service]
            Type=oneshot
            Environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            Environment=PROJECT_DIR=$PROJECT_DIR
            Environment=BACKUP_DIR=${{ env.BACKUP_DIR }}
            ExecStart=$PROJECT_DIR/scripts/backup-postgres.sh
            StandardOutput=append:${{ env.BACKUP_DIR }}/backup.log
            StandardError=append:${{ env.BACKUP_DIR }}/backup.log
            EOF

              cat > /etc/systemd/system/bolaov2-db-backup.timer <<'EOF'
            [Unit]
            Description=Run bolaov2 database backup daily

            [Timer]
            OnCalendar=*-*-* 03:30:00
            Persistent=true

            [Install]
            WantedBy=timers.target
            EOF

              systemctl daemon-reload
              systemctl enable --now bolaov2-db-backup.timer
            else
              echo "❌ Neither crontab nor systemd is available to schedule backups."
              exit 1
            fi

            echo "⏳ Waiting for app to stabilize..."
            sleep 10

            echo "📋 App logs:"
            docker logs --tail 80 bolaov2 || true

            if ! docker ps --format '{{.Names}} {{.Status}}' | grep -q '^bolaov2 '; then
              echo "❌ App container is not running."
              docker ps -a | grep bolaov2 || true
              exit 1
            fi

            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true

            echo "✅ Deployment completed."
            docker compose -f docker-compose.prod.yml ps
