name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APP_NAME: bolaov2
  PROJECT_DIR: /usr/documents/projects/bolaov2
  BACKUP_DIR: /usr/documents/backups/bolaov2/postgres

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    needs: test-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy bundle
        run: |
          rm -rf .deploy
          mkdir -p .deploy
          tar \
            --exclude='./.deploy' \
            --exclude='./.git' \
            --exclude='./.env' \
            --exclude='./.env.local' \
            --exclude='./.env.*.local' \
            --exclude='./node_modules' \
            --exclude='./.next' \
            -cf - . | tar -xf - -C .deploy

      - name: Check SSH connectivity
        env:
          DEPLOY_HOST: ${{ secrets.HOST }}
          DEPLOY_PORT: ${{ secrets.PORT }}
          DEPLOY_USER: ${{ secrets.USERNAME }}
          DEPLOY_KEY: ${{ secrets.SSHKEY }}
        run: |
          set -euo pipefail

          echo "Resolving deploy host..."
          getent ahosts "$DEPLOY_HOST" || true

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          for attempt in 1 2 3 4 5; do
            echo "Testing SSH connectivity, attempt $attempt/5..."

            if ! timeout 30 bash -c "cat < /dev/null > /dev/tcp/$DEPLOY_HOST/$DEPLOY_PORT"; then
              echo "TCP connection to SSH port failed."
              sleep $((attempt * 15))
              continue
            fi

            echo "TCP connection succeeded; testing SSH authentication..."
            if ssh \
                -i ~/.ssh/deploy_key \
                -p "$DEPLOY_PORT" \
                -o BatchMode=yes \
                -o ConnectTimeout=30 \
                -o StrictHostKeyChecking=accept-new \
                "$DEPLOY_USER@$DEPLOY_HOST" true; then
              echo "SSH connectivity check passed."
              exit 0
            fi

            sleep $((attempt * 15))
          done

          echo "SSH connectivity check failed after 5 attempts."
          exit 1

      - name: Sync project to VPS (attempt 1)
        id: sync-attempt-1
        continue-on-error: true
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSHKEY }}
          source: ".deploy"
          target: "${{ env.PROJECT_DIR }}"
          strip_components: 1
          timeout: 300s
          command_timeout: 20m
          overwrite: true
          rm: false

      - name: Wait before sync retry 2
        if: steps.sync-attempt-1.outcome == 'failure'
        run: sleep 30

      - name: Sync project to VPS (attempt 2)
        id: sync-attempt-2
        if: steps.sync-attempt-1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSHKEY }}
          source: ".deploy"
          target: "${{ env.PROJECT_DIR }}"
          strip_components: 1
          timeout: 300s
          command_timeout: 20m
          overwrite: true
          rm: false

      - name: Wait before sync retry 3
        if: steps.sync-attempt-1.outcome == 'failure' && steps.sync-attempt-2.outcome == 'failure'
        run: sleep 60

      - name: Sync project to VPS (attempt 3)
        if: steps.sync-attempt-1.outcome == 'failure' && steps.sync-attempt-2.outcome == 'failure'
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSHKEY }}
          source: ".deploy"
          target: "${{ env.PROJECT_DIR }}"
          strip_components: 1
          timeout: 300s
          command_timeout: 20m
          overwrite: true
          rm: false

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          key: ${{ secrets.SSHKEY }}
          timeout: 300s
          command_timeout: 30m
          script: |
            set -euo pipefail

            PROJECT_DIR="${{ env.PROJECT_DIR }}"
            cd "$PROJECT_DIR"

            if [ ! -f .env ]; then
              echo "❌ .env not found in $PROJECT_DIR"
              echo "Create it from .env.production.example before deploying."
              exit 1
            fi

            echo "🏗️ Building and starting services..."
            docker compose -f docker-compose.prod.yml --env-file .env up -d --build --remove-orphans

            echo "💾 Installing database backup schedule..."
            chmod +x scripts/backup-postgres.sh
            mkdir -p "${{ env.BACKUP_DIR }}"
            BACKUP_CMD="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin PROJECT_DIR=$PROJECT_DIR BACKUP_DIR=${{ env.BACKUP_DIR }} $PROJECT_DIR/scripts/backup-postgres.sh >> ${{ env.BACKUP_DIR }}/backup.log 2>&1"

            if command -v crontab >/dev/null 2>&1; then
              CRON_LINE="30 3 * * * $BACKUP_CMD"
              (crontab -l 2>/dev/null | grep -v "$PROJECT_DIR/scripts/backup-postgres.sh" || true; echo "$CRON_LINE") | crontab -
            elif command -v systemctl >/dev/null 2>&1 && [ -d /etc/systemd/system ]; then
              cat > /etc/systemd/system/bolaov2-db-backup.service <<EOF
            [Unit]
            Description=Backup bolaov2 Postgres database
            After=docker.service
            Requires=docker.service

            [Service]
            Type=oneshot
            Environment=PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            Environment=PROJECT_DIR=$PROJECT_DIR
            Environment=BACKUP_DIR=${{ env.BACKUP_DIR }}
            ExecStart=$PROJECT_DIR/scripts/backup-postgres.sh
            StandardOutput=append:${{ env.BACKUP_DIR }}/backup.log
            StandardError=append:${{ env.BACKUP_DIR }}/backup.log
            EOF

              cat > /etc/systemd/system/bolaov2-db-backup.timer <<'EOF'
            [Unit]
            Description=Run bolaov2 database backup daily

            [Timer]
            OnCalendar=*-*-* 03:30:00
            Persistent=true

            [Install]
            WantedBy=timers.target
            EOF

              systemctl daemon-reload
              systemctl enable --now bolaov2-db-backup.timer
            else
              echo "❌ Neither crontab nor systemd is available to schedule backups."
              exit 1
            fi

            echo "⏳ Waiting for app to stabilize..."
            sleep 10

            echo "📋 App logs:"
            docker logs --tail 80 bolaov2 || true

            if ! docker ps --format '{{.Names}} {{.Status}}' | grep -q '^bolaov2 '; then
              echo "❌ App container is not running."
              docker ps -a | grep bolaov2 || true
              exit 1
            fi

            echo "🧹 Cleaning up old images..."
            docker image prune -af --filter "until=24h" || true

            echo "✅ Deployment completed."
            docker compose -f docker-compose.prod.yml ps
